name: pyharness CI
description: Install pyharness and run the repository quality pipeline through harness ci.

inputs:
  python-version:
    description: Python version used to install and run pyharness.
    required: false
    default: "3.13"
  install-command:
    description: Command that installs pyharness before running CI.
    required: false
    default: python -m pip install pyharness
  command:
    description: pyharness command to run.
    required: false
    default: harness ci

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install pyharness
      shell: bash
      run: |
        python -m pip install --upgrade pip
        ${{ inputs.install-command }}

    - name: Run pyharness
      shell: bash
      run: python -m harness.github_action --command "${{ inputs.command }}"
