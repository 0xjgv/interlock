name: interlock CI
description: Install interlock and run the repository quality pipeline through interlock ci.

inputs:
  python-version:
    description: Python version used to install interlock and run interlock.
    required: false
    default: "3.13"
  install-command:
    description: Command that installs interlock before running CI.
    required: false
    default: python -m pip install interlock
  command:
    description: interlock command to run.
    required: false
    default: interlock ci

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install interlock
      shell: bash
      run: |
        python -m pip install --upgrade pip
        ${{ inputs.install-command }}

    - name: Run interlock
      shell: bash
      run: python -m interlock.github_action --command "${{ inputs.command }}"
